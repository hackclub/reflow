name: KiCad PCB Check

on:
  pull_request:
    paths:
      - '**/*.kicad_pcb'
    types: [opened, synchronize, reopened, assigned]

jobs:
  check-pcb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      # Install KiCad tools (if needed)
      - name: Install KiCad
        id: kicad-inst
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-9.0-releases
          sudo apt update
          sudo apt install --install-recommends -y kicad
      
      # Install Python & Deps
      - name: Install UV, Python, Dependencies
        id: python-deps
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv python install 3.12

      - name: Run Python Checks
        id: run-tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          cd ci 
          uv sync 
          uv run python main.py
      
      - name: Read logs
        id: logs
        run: |
          echo 'Heyo! Reflow's automated review bot here. There's a series of things you should keep note of:
          echo '```' > output.txt
          cat info.log >> output.txt
          echo '```' >> output.txt
          echo "FILE_CONTENT<<EOF" >> $GITHUB_ENV
          cat output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # yall deesrve honesty so imma go out on a limb and say this was vibe coded. it's.... okay? we'll see ig!
      - name: Post comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"${{ env.FILE_CONTENT }}\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments"

      - name: Compress output folder
        id: output_compression
        run: tar -czvf output.tar.gz output/

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: output.tar.gz
